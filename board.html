<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>地図に配置する | 村の案内図ゲーム</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header compact">
    <div>
      <p class="eyebrow">◈ 配置操作 ◈</p>
      <h1>村の案内図ゲーム</h1>
    </div>
    <nav class="top-nav" aria-label="ページ">
      <a href="index.html">ホーム</a>
      <a href="view.html">情報を見る</a>
    </nav>
  </header>

  <main class="board-layout">
    <!-- 地図エリア -->
    <section class="board-stage" aria-label="地図">
      <div class="map-board" id="mapBoard">
        <img src="daisi.png" alt="村の白地図" id="mapImg">
        <div class="token-layer" id="tokenLayer"></div>
      </div>
    </section>

    <!-- パレット -->
    <aside class="shop-tray" aria-label="村人カード">
      <div class="tray-header">
        <h2>村人カード</h2>
        <button class="tray-btn" id="resetBtn" type="button">リセット</button>
      </div>
      <div class="selected-status" id="selectedStatus">カードをクリックして選択</div>
      <div class="card-palette" id="cardPalette"></div>
      <div class="board-tip">
        <strong>操作方法</strong><br>
        ① カードをクリック → 選択<br>
        ② 地図をクリック → 配置<br>
        ③ コマをドラッグ → 移動<br>
        ④ コマをダブルクリック → 削除
      </div>
    </aside>
  </main>

  <script src="data.js"></script>
  <script>
    const mapBoard       = document.getElementById("mapBoard");
    const tokenLayer     = document.getElementById("tokenLayer");
    const cardPalette    = document.getElementById("cardPalette");
    const selectedStatus = document.getElementById("selectedStatus");
    const resetBtn       = document.getElementById("resetBtn");
    const STORAGE_KEY    = "muranoannaizu-board-v1";

    let positions  = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    let selectedId = null;
    let dragging   = null;

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(positions)); }

    function setSelected(id) {
      selectedId = id;
      const v = id ? VILLAGERS.find(v => v.id === id) : null;
      selectedStatus.textContent = v ? `${v.name} を選択中` : "カードをクリックして選択";
      renderPalette();
    }

    function renderPalette() {
      cardPalette.innerHTML = "";
      VILLAGERS.forEach(v => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "vcard";
        if (selectedId === v.id) btn.classList.add("selected");
        if (positions[v.id])     btn.classList.add("placed");
        btn.innerHTML = `<img src="${v.image}" alt=""><span>${v.name}</span>`;
        btn.addEventListener("click", () => setSelected(selectedId === v.id ? null : v.id));
        cardPalette.appendChild(btn);
      });
    }

    function renderTokens() {
      tokenLayer.innerHTML = "";
      Object.entries(positions).forEach(([id, pos]) => {
        const v = VILLAGERS.find(v => v.id === id);
        if (!v) return;
        const tok = document.createElement("div");
        tok.className = "token";
        tok.dataset.id = id;
        tok.style.left = pos.x + "%";
        tok.style.top  = pos.y + "%";
        tok.innerHTML  = `<img src="${v.image}" alt="${v.name}"><span>${v.name}</span>`;

        tok.addEventListener("dblclick", e => {
          e.stopPropagation();
          delete positions[id];
          save(); renderTokens(); renderPalette();
          if (selectedId === id) setSelected(null);
        });

        tok.addEventListener("mousedown", e => {
          if (e.button !== 0) return;
          e.stopPropagation(); e.preventDefault();
          tok.classList.add("dragging");
          dragging = { id, startClientX: e.clientX, startClientY: e.clientY,
            origX: pos.x, origY: pos.y, rect: mapBoard.getBoundingClientRect() };
          setSelected(null);
        });

        tok.addEventListener("touchstart", e => {
          e.stopPropagation();
          const t = e.touches[0];
          tok.classList.add("dragging");
          dragging = { id, startClientX: t.clientX, startClientY: t.clientY,
            origX: pos.x, origY: pos.y, rect: mapBoard.getBoundingClientRect() };
        }, { passive: true });

        tokenLayer.appendChild(tok);
      });
    }

    function applyDragMove(cx, cy) {
      if (!dragging) return;
      const dx = ((cx - dragging.startClientX) / dragging.rect.width)  * 100;
      const dy = ((cy - dragging.startClientY) / dragging.rect.height) * 100;
      const nx = Math.max(0, Math.min(100, dragging.origX + dx));
      const ny = Math.max(0, Math.min(100, dragging.origY + dy));
      const tok = tokenLayer.querySelector(`[data-id="${dragging.id}"]`);
      if (tok) { tok.style.left = nx + "%"; tok.style.top = ny + "%"; }
    }

    function finishDrag(cx, cy) {
      if (!dragging) return;
      const dx = ((cx - dragging.startClientX) / dragging.rect.width)  * 100;
      const dy = ((cy - dragging.startClientY) / dragging.rect.height) * 100;
      positions[dragging.id] = {
        x: Math.max(0, Math.min(100, dragging.origX + dx)),
        y: Math.max(0, Math.min(100, dragging.origY + dy)),
      };
      save();
      const tok = tokenLayer.querySelector(`[data-id="${dragging.id}"]`);
      if (tok) tok.classList.remove("dragging");
      dragging = null;
      renderPalette();
    }

    document.addEventListener("mousemove", e => applyDragMove(e.clientX, e.clientY));
    document.addEventListener("mouseup",   e => finishDrag(e.clientX, e.clientY));
    document.addEventListener("touchmove", e => { const t = e.touches[0]; applyDragMove(t.clientX, t.clientY); }, { passive: true });
    document.addEventListener("touchend",  e => { const t = e.changedTouches[0]; finishDrag(t.clientX, t.clientY); });

    mapBoard.addEventListener("click", e => {
      if (!selectedId || dragging) return;
      const rect = mapBoard.getBoundingClientRect();
      positions[selectedId] = {
        x: ((e.clientX - rect.left) / rect.width)  * 100,
        y: ((e.clientY - rect.top)  / rect.height) * 100,
      };
      save(); renderTokens(); renderPalette(); setSelected(null);
    });

    resetBtn.addEventListener("click", () => {
      if (!confirm("配置をすべてリセットしますか？")) return;
      positions = {};
      save(); setSelected(null); renderTokens(); renderPalette();
    });

    renderTokens();
    renderPalette();
  </script>
</body>
</html>
