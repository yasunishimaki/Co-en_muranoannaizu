<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>地図に配置する | 村の案内図ゲーム</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header compact">
    <div>
      <p class="eyebrow">配置操作</p>
      <h1>村の案内図ゲーム</h1>
    </div>
    <nav class="top-nav" aria-label="ページ">
      <a href="index.html">ホーム</a>
      <a href="view.html">情報を見る</a>
    </nav>
  </header>

  <main class="board-layout">
    <!-- 地図エリア -->
    <section class="board-stage" aria-label="地図">
      <div class="map-board" id="mapBoard">
        <img src="daisi.png" alt="村の白地図" id="mapImg">
        <div class="token-layer" id="tokenLayer"></div>
      </div>
    </section>

    <!-- パレット -->
    <aside class="shop-tray" aria-label="村人カード">
      <div class="tray-header">
        <h2>村人カード</h2>
        <button class="tray-btn" id="resetBtn" type="button">リセット</button>
      </div>
      <div class="selected-status" id="selectedStatus">カードをクリックして選択</div>
      <div class="card-palette" id="cardPalette"></div>
      <div class="board-tip">
        <strong>操作方法</strong><br>
        ① カードをクリック → 選択<br>
        ② 地図上をクリック → 配置<br>
        ③ 配置済みコマをドラッグ → 移動<br>
        ④ 配置済みコマをダブルクリック → 削除
      </div>
    </aside>
  </main>

  <script src="data.js"></script>
  <script>
    const mapBoard      = document.getElementById("mapBoard");
    const tokenLayer    = document.getElementById("tokenLayer");
    const cardPalette   = document.getElementById("cardPalette");
    const selectedStatus = document.getElementById("selectedStatus");
    const resetBtn      = document.getElementById("resetBtn");
    const STORAGE_KEY   = "muranoannaizu-board-v1";

    // positions: { villager_id: { x: %, y: % } }
    let positions = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    let selectedId = null;
    let dragging = null; // { id, startX, startY, origX, origY }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(positions));
    }

    function setSelected(id) {
      selectedId = id;
      const v = id ? VILLAGERS.find(v => v.id === id) : null;
      selectedStatus.textContent = v ? `${v.name} を選択中` : "カードをクリックして選択";
      renderPalette();
    }

    /* ── Palette ── */
    function renderPalette() {
      cardPalette.innerHTML = "";
      VILLAGERS.forEach(v => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "vcard";
        if (selectedId === v.id) btn.classList.add("selected");
        if (positions[v.id]) btn.classList.add("placed");
        btn.innerHTML = `<img src="${v.image}" alt=""><span>${v.name}</span>`;
        btn.addEventListener("click", () => {
          setSelected(selectedId === v.id ? null : v.id);
        });
        cardPalette.appendChild(btn);
      });
    }

    /* ── Tokens on map ── */
    function renderTokens() {
      tokenLayer.innerHTML = "";
      Object.entries(positions).forEach(([id, pos]) => {
        const v = VILLAGERS.find(v => v.id === id);
        if (!v) return;
        const tok = document.createElement("div");
        tok.className = "token";
        tok.dataset.id = id;
        tok.style.left = pos.x + "%";
        tok.style.top  = pos.y + "%";
        tok.innerHTML  = `<img src="${v.image}" alt="${v.name}"><span>${v.name}</span>`;

        // ダブルクリック → 削除
        tok.addEventListener("dblclick", e => {
          e.stopPropagation();
          delete positions[id];
          save();
          renderTokens();
          renderPalette();
          if (selectedId === id) setSelected(null);
        });

        // ドラッグ移動
        tok.addEventListener("mousedown", e => {
          if (e.button !== 0) return;
          e.stopPropagation();
          e.preventDefault();
          tok.classList.add("dragging");
          const rect = mapBoard.getBoundingClientRect();
          dragging = {
            id,
            startClientX: e.clientX,
            startClientY: e.clientY,
            origX: pos.x,
            origY: pos.y,
            rect,
          };
          setSelected(null);
        });

        // タッチドラッグ
        tok.addEventListener("touchstart", e => {
          e.stopPropagation();
          const t = e.touches[0];
          const rect = mapBoard.getBoundingClientRect();
          tok.classList.add("dragging");
          dragging = {
            id,
            startClientX: t.clientX,
            startClientY: t.clientY,
            origX: pos.x,
            origY: pos.y,
            rect,
          };
        }, { passive: true });

        tokenLayer.appendChild(tok);
      });
    }

    /* ── Mouse move / up for drag ── */
    function onMouseMove(e) {
      if (!dragging) return;
      const dx = ((e.clientX - dragging.startClientX) / dragging.rect.width)  * 100;
      const dy = ((e.clientY - dragging.startClientY) / dragging.rect.height) * 100;
      const nx = Math.max(0, Math.min(100, dragging.origX + dx));
      const ny = Math.max(0, Math.min(100, dragging.origY + dy));
      const tok = tokenLayer.querySelector(`[data-id="${dragging.id}"]`);
      if (tok) { tok.style.left = nx + "%"; tok.style.top = ny + "%"; }
    }

    function onMouseUp(e) {
      if (!dragging) return;
      const dx = ((e.clientX - dragging.startClientX) / dragging.rect.width)  * 100;
      const dy = ((e.clientY - dragging.startClientY) / dragging.rect.height) * 100;
      positions[dragging.id] = {
        x: Math.max(0, Math.min(100, dragging.origX + dx)),
        y: Math.max(0, Math.min(100, dragging.origY + dy)),
      };
      save();
      const tok = tokenLayer.querySelector(`[data-id="${dragging.id}"]`);
      if (tok) tok.classList.remove("dragging");
      dragging = null;
      renderPalette();
    }

    function onTouchMove(e) {
      if (!dragging) return;
      const t = e.touches[0];
      const dx = ((t.clientX - dragging.startClientX) / dragging.rect.width)  * 100;
      const dy = ((t.clientY - dragging.startClientY) / dragging.rect.height) * 100;
      const nx = Math.max(0, Math.min(100, dragging.origX + dx));
      const ny = Math.max(0, Math.min(100, dragging.origY + dy));
      const tok = tokenLayer.querySelector(`[data-id="${dragging.id}"]`);
      if (tok) { tok.style.left = nx + "%"; tok.style.top = ny + "%"; }
    }

    function onTouchEnd(e) {
      if (!dragging) return;
      const t = e.changedTouches[0];
      const dx = ((t.clientX - dragging.startClientX) / dragging.rect.width)  * 100;
      const dy = ((t.clientY - dragging.startClientY) / dragging.rect.height) * 100;
      positions[dragging.id] = {
        x: Math.max(0, Math.min(100, dragging.origX + dx)),
        y: Math.max(0, Math.min(100, dragging.origY + dy)),
      };
      save();
      const tok = tokenLayer.querySelector(`[data-id="${dragging.id}"]`);
      if (tok) tok.classList.remove("dragging");
      dragging = null;
      renderPalette();
    }

    document.addEventListener("mousemove", onMouseMove);
    document.addEventListener("mouseup",   onMouseUp);
    document.addEventListener("touchmove", onTouchMove, { passive: true });
    document.addEventListener("touchend",  onTouchEnd);

    /* ── Map click → 配置 ── */
    mapBoard.addEventListener("click", e => {
      if (!selectedId) return;
      if (dragging) return;
      const rect = mapBoard.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width)  * 100;
      const y = ((e.clientY - rect.top)  / rect.height) * 100;
      positions[selectedId] = { x, y };
      save();
      renderTokens();
      renderPalette();
      setSelected(null);
    });

    /* ── Reset ── */
    resetBtn.addEventListener("click", () => {
      if (!confirm("配置をすべてリセットしますか？")) return;
      positions = {};
      save();
      setSelected(null);
      renderTokens();
      renderPalette();
    });

    /* ── Init ── */
    renderTokens();
    renderPalette();
  </script>
</body>
</html>
